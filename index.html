<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Effortless Lucidity</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#ui{
position:absolute;
top:0;
left:0;
width:100%;
color:white;
padding:20px;
pointer-events:none;
}

#text{
max-width:320px;
font-size:18px;
line-height:1.4;
opacity:.9;
}

#awareness{
position:absolute;
bottom:20px;
left:20px;
height:6px;
width:0%;
background:#7df9ff;
transition:.4s;
}

#joystick{
position:absolute;
bottom:30px;
left:30px;
width:90px;
height:90px;
border-radius:50%;
border:2px solid rgba(255,255,255,.4);
touch-action:none;
}

#stick{
position:absolute;
width:40px;
height:40px;
background:white;
border-radius:50%;
left:25px;
top:25px;
opacity:.8;
}

</style>
</head>

<body>

<div id="ui">
<div id="text"></div>
<div id="awareness"></div>
</div>

<div id="joystick"><div id="stick"></div></div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js"

let scene=new THREE.Scene()
scene.background=new THREE.Color(0x000000)

let camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)
})

/* lighting */

let hemi=new THREE.HemisphereLight(0xffffff,0x111133,1.3)
scene.add(hemi)

let dreamLight=new THREE.PointLight(0x88ccff,2,40)
dreamLight.position.set(0,10,0)
scene.add(dreamLight)

/* player */

let player=new THREE.Mesh(
new THREE.CapsuleGeometry(.6,1.2,4,8),
new THREE.MeshStandardMaterial({color:0xffffff})
)

scene.add(player)
player.position.y=1

/* camera system */

let cameraAngle=0

function updateCamera(){

let distance=6

let x=player.position.x+Math.sin(cameraAngle)*distance
let z=player.position.z+Math.cos(cameraAngle)*distance

camera.position.set(x,3,z)
camera.lookAt(player.position)

}

/* dream particles */

let particles=new THREE.BufferGeometry()
let count=1500

let pos=new Float32Array(count*3)

for(let i=0;i<count;i++){

pos[i*3]=(Math.random()-.5)*80
pos[i*3+1]=Math.random()*20
pos[i*3+2]=(Math.random()-.5)*120

}

particles.setAttribute("position",new THREE.BufferAttribute(pos,3))

let particleMat=new THREE.PointsMaterial({
size:.15,
color:0x99ffff
})

let starfield=new THREE.Points(particles,particleMat)
scene.add(starfield)

/* floating dream platforms */

function createDreamPlatforms(){

for(let i=0;i<40;i++){

let box=new THREE.Mesh(

new THREE.BoxGeometry(
3+Math.random()*5,
.4,
3+Math.random()*5
),

new THREE.MeshStandardMaterial({
color:0x111111
})

)

box.position.x=(Math.random()-.5)*20
box.position.y=Math.random()*3
box.position.z=-i*6

scene.add(box)

}

}

createDreamPlatforms()

/* awareness system */

let awareness=0
let lucid=false

function showText(t){

document.getElementById("text").innerText=t

setTimeout(()=>{
document.getElementById("text").innerText=""
},6000)

}

function addAwareness(v){

awareness+=v
if(awareness>100) awareness=100

document.getElementById("awareness").style.width=awareness+"%"

if(awareness>=100 && !lucid){

lucid=true

showText("You realize…\nThis is a dream.")

}

}

/* dream triggers */

function makeTrigger(z,text,value){

let orb=new THREE.Mesh(

new THREE.SphereGeometry(.8,16,16),

new THREE.MeshStandardMaterial({
color:0x00ffff,
emissive:0x00ffff
})

)

orb.position.set(0,1,z)

scene.add(orb)

return {orb,text,value}

}

let triggers=[

makeTrigger(-15,
"Step 1\nClear your mind.\nImagine erasing your day from a chalkboard.",
30),

makeTrigger(-35,
"Step 2\nFeed curiosity.\nRead a lucid dream story.",
30),

makeTrigger(-60,
"Step 3\nWhat if this was a dream?",
40)

]

/* joystick */

let joystick=document.getElementById("joystick")
let stick=document.getElementById("stick")

let move={x:0,z:0}
let dragging=false

joystick.addEventListener("touchstart",()=>dragging=true)

joystick.addEventListener("touchend",()=>{

dragging=false
move.x=0
move.z=0

stick.style.left="25px"
stick.style.top="25px"

})

joystick.addEventListener("touchmove",(e)=>{

if(!dragging)return

let rect=joystick.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left
let y=e.touches[0].clientY-rect.top

let dx=x-45
let dy=y-45

let dist=Math.sqrt(dx*dx+dy*dy)
let max=35

if(dist>max){

dx=dx/dist*max
dy=dy/dist*max

}

stick.style.left=(dx+45-20)+"px"
stick.style.top=(dy+45-20)+"px"

move.x=dx/max
move.z=dy/max

})

/* swipe camera */

let touching=false
let lastX=0

document.addEventListener("touchstart",e=>{
touching=true
lastX=e.touches[0].clientX
})

document.addEventListener("touchmove",e=>{

if(!touching)return

let dx=e.touches[0].clientX-lastX

cameraAngle-=dx*0.005

lastX=e.touches[0].clientX

})

document.addEventListener("touchend",()=>touching=false)

/* keyboard */

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

/* movement */

function movePlayer(){

if(keys["w"])move.z=-1
if(keys["s"])move.z=1
if(keys["a"])move.x=-1
if(keys["d"])move.x=1

let speed=lucid?.12:.07

player.position.x+=move.x*speed
player.position.z+=move.z*speed

move.x*=.9
move.z*=.9

}

/* triggers */

function checkTriggers(){

triggers.forEach(t=>{

if(!t.orb)return

if(player.position.distanceTo(t.orb.position)<2){

showText(t.text)

addAwareness(t.value)

scene.remove(t.orb)
t.orb=null

}

})

}

/* lucid flight */

function updateLucid(){

if(!lucid)return

player.position.y=1+Math.sin(Date.now()*0.003)*.4

}

/* animation loop */

function animate(){

requestAnimationFrame(animate)

movePlayer()

updateCamera()

checkTriggers()

updateLucid()

starfield.rotation.y+=0.0003

renderer.render(scene,camera)

}

showText("Don't force lucid dreams.\nAllow them.")

animate()

</script>
</body>
</html>
