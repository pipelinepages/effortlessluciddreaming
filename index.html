<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Effortless Lucid Dreaming – mobile optimized</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: #060e18;
            font-family: 'Inter', system-ui, sans-serif;
            color: #e6d9c8;
            touch-action: none; /* Critical for mobile lag */
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas#scene {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: block;
            outline: none;
            will-change: transform; /* Force GPU layer */
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            z-index: 10;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
        }

        #title-screen, #success-screen {
            background: rgba(6, 14, 24, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            text-shadow: 0 0 40px rgba(230, 217, 200, 0.35);
            letter-spacing: -1.5px;
            line-height: 1.1;
        }

        h1 { font-size: clamp(2.8rem, 9vw, 5.5rem); font-weight: 700; }
        h2 { font-size: clamp(2.2rem, 7vw, 4rem); font-weight: 700; }

        .subtitle {
            font-size: 1.1rem;
            margin-top: 10px;
            opacity: 0.55;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            background: rgba(230, 217, 200, 0.08);
            color: #e6d9c8;
            border: 1.5px solid rgba(230, 217, 200, 0.5);
            padding: 14px 44px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            margin-top: 40px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(6px);
        }

        .btn:active { transform: scale(0.95); background: rgba(230, 217, 200, 0.9); color: #0a1428; }

        #game-hud {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 20px 40px;
            transition: opacity 0.6s ease;
        }

        #game-hud.hidden { opacity: 0; }

        .hud-top { display: flex; justify-content: center; }

        .hud-instruction {
            background: rgba(6, 14, 24, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 10px 24px;
            border-radius: 40px;
            border: 1px solid rgba(230, 217, 200, 0.08);
            text-align: center;
        }

        .hud-instruction p { font-size: 0.9rem; opacity: 0.85; }
        .hud-instruction p.hint { font-size: 0.75rem; opacity: 0.45; margin-top: 2px; }

        .hud-bottom { max-width: 280px; margin: 0 auto; width: 100%; }

        .progress-track {
            width: 100%;
            height: 3px;
            background: rgba(230, 217, 200, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(230, 217, 200, 0.4), #c8bda8);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 6px;
        }

        .progress-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0.35; }
        .progress-percent { font-size: 1.2rem; font-weight: 600; opacity: 0.9; }

        blockquote {
            max-width: 380px;
            font-size: 1.15rem;
            line-height: 1.7;
            font-style: italic;
            opacity: 0.75;
            margin: 32px 0 0;
            font-weight: 300;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0);    }
        }

        .animate-in { animation: fadeInUp 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .animate-in-delay { opacity: 0; animation: fadeInUp 0.9s cubic-bezier(0.23, 1, 0.32, 1) 0.2s forwards; }
        .animate-in-delay2 { opacity: 0; animation: fadeInUp 0.9s cubic-bezier(0.23, 1, 0.32, 1) 0.4s forwards; }
    </style>
</head>
<body>

<canvas id="scene"></canvas>

<div id="title-screen" class="screen">
    <h1 class="animate-in">Effortless<br>Lucid Dreaming</h1>
    <p class="subtitle animate-in-delay">Stage 1 · Clear Your Mind</p>
    <button class="btn animate-in-delay2" onclick="startGame()">Begin Gently</button>
</div>

<div id="game-hud" class="hidden">
    <div class="hud-top">
        <div class="hud-instruction">
            <p>Gently swipe to erase the day.</p>
            <p class="hint">Relax. Let go.</p>
        </div>
    </div>
    <div class="hud-bottom">
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-meta">
            <span class="progress-label">Clarity</span>
            <span class="progress-percent" id="progress-percent">0%</span>
        </div>
    </div>
</div>

<div id="success-screen" class="screen hidden">
    <h2 class="animate-in">Mind Cleared</h2>
    <blockquote class="animate-in-delay">
        "Don't strain—just relax and let go.<br><br>
        Ease is the fuel.<br>
        Effort kills the vibe."
    </blockquote>
    <button class="btn animate-in-delay2" onclick="restart()">Dream On →</button>
</div>

<script>
// --- Configuration ---
const TEX_W = 512, TEX_H = 340;
const ERASE_RADIUS = 28;
const PROGRESS_CHECK_RATE = 60; // Every 60 frames (~1s). Prevents mobile lag spikes.

// --- Renderer Setup ---
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false, powerPreference: "high-performance" });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#060e18');
scene.fog = new THREE.Fog('#060e18', 6, 25);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.z = 5;

// --- Lighting ---
scene.add(new THREE.AmbientLight(0xe6d9c8, 0.3));
const dirLight = new THREE.DirectionalLight(0xe6d9c8, 0.5);
dirLight.position.set(2, 3, 5);
scene.add(dirLight);

// --- Background Elements ---
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(300 * 3);
for (let i = 0; i < 300; i++) {
    starPos[i*3] = (Math.random()-0.5)*40;
    starPos[i*3+1] = (Math.random()-0.5)*30;
    starPos[i*3+2] = -5 - Math.random()*15;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.05, color: 0xc8bda8, transparent: true, opacity: 0.4 }));
scene.add(stars);

// --- Chalkboard Logic ---
const boardGroup = new THREE.Group();
boardGroup.visible = false;
scene.add(boardGroup);

const chalkCanvas = document.createElement('canvas');
chalkCanvas.width = TEX_W; chalkCanvas.height = TEX_H;
const chalkCtx = chalkCanvas.getContext('2d');

const maskCanvas = document.createElement('canvas');
maskCanvas.width = TEX_W; maskCanvas.height = TEX_H;
const maskCtx = maskCanvas.getContext('2d');

const compCanvas = document.createElement('canvas');
compCanvas.width = TEX_W; compCanvas.height = TEX_H;
const compCtx = compCanvas.getContext('2d');
const compTexture = new THREE.CanvasTexture(compCanvas);

function drawWritings() {
    chalkCtx.fillStyle = '#162428';
    chalkCtx.fillRect(0, 0, TEX_W, TEX_H);
    chalkCtx.fillStyle = '#d7cdbc';
    chalkCtx.font = '16px Inter, sans-serif';
    const lines = ["9:00 — Morning meeting", "Reply to emails ✓", "Grocery list: milk, eggs", "Call mom back", "Finish report !!!", "Anxiety about tomorrow...", "Dentist @ 3pm"];
    lines.forEach((t, i) => chalkCtx.fillText(t, 40 + (i%2)*200, 40 + i*40));
}
drawWritings();

const chalkMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(4.8, 3.2),
    new THREE.MeshStandardMaterial({ map: compTexture, transparent: true, roughness: 0.9 })
);
boardGroup.add(chalkMesh);

// --- Smooth Erase Logic ---
let lastUV = null;

function eraseBetween(uv1, uv2) {
    const x1 = uv1.x * TEX_W, y1 = (1 - uv1.y) * TEX_H;
    const x2 = uv2.x * TEX_W, y2 = (1 - uv2.y) * TEX_H;

    maskCtx.globalCompositeOperation = 'source-over';
    maskCtx.strokeStyle = 'white';
    maskCtx.lineWidth = ERASE_RADIUS * 2;
    maskCtx.lineCap = 'round';
    maskCtx.lineJoin = 'round';
    
    // Blur effect for eraser
    maskCtx.shadowBlur = 10;
    maskCtx.shadowColor = 'white';

    maskCtx.beginPath();
    maskCtx.moveTo(x1, y1);
    maskCtx.lineTo(x2, y2);
    maskCtx.stroke();
}

function updateComposite() {
    compCtx.clearRect(0, 0, TEX_W, TEX_H);
    compCtx.drawImage(chalkCanvas, 0, 0);
    compCtx.globalCompositeOperation = 'destination-out';
    compCtx.drawImage(maskCanvas, 0, 0);
    compCtx.globalCompositeOperation = 'source-over';
    compTexture.needsUpdate = true;
}

// --- Interaction ---
let isDragging = false;
let gameState = 'title';
let progress = 0;
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const pendingPoints = [];

function handlePointer(e) {
    if (gameState !== 'playing') return;
    const rect = canvas.getBoundingClientRect();
    pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObject(chalkMesh);
    if (hits.length > 0 && hits[0].uv) {
        pendingPoints.push(hits[0].uv.clone());
    }
}

canvas.addEventListener('pointerdown', e => {
    isDragging = true;
    canvas.setPointerCapture(e.pointerId); // Keep tracking even if finger slides off
    handlePointer(e);
});

canvas.addEventListener('pointermove', e => {
    if (!isDragging) return;
    // Mobile browsers often batch moves; getCoalescedEvents provides sub-frame precision
    if (e.getCoalescedEvents) {
        for (let ce of e.getCoalescedEvents()) handlePointer(ce);
    } else {
        handlePointer(e);
    }
});

canvas.addEventListener('pointerup', () => {
    isDragging = false;
    lastUV = null;
});

// --- Progress Calculation ---
function calcProgress() {
    const data = maskCtx.getImageData(0, 0, TEX_W, TEX_H).data;
    let erased = 0;
    for (let i = 3; i < data.length; i += 64) { // High stride for speed
        if (data[i] > 150) erased++;
    }
    return erased / (data.length / 64);
}

// --- Game Loop ---
const clock = new THREE.Clock();
let frameCount = 0;

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    frameCount++;

    if (pendingPoints.length > 0) {
        pendingPoints.forEach(uv => {
            if (lastUV) eraseBetween(lastUV, uv);
            lastUV = uv;
        });
        pendingPoints.length = 0;
        updateComposite();

        // Only check progress every 60 frames to avoid "The Stutter"
        if (frameCount % PROGRESS_CHECK_RATE === 0) {
            progress = calcProgress();
            const pct = Math.min(Math.round(progress * 130), 100); // Scaled for better feel
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-percent').textContent = pct + '%';
            if (pct >= 95) showSuccess();
        }
    }

    stars.rotation.y = t * 0.02;
    if (boardGroup.visible) {
        boardGroup.position.y = Math.sin(t * 0.5) * 0.05;
        boardGroup.rotation.z = Math.sin(t * 0.3) * 0.01;
    }

    renderer.render(scene, camera);
}

// --- UI Actions ---
function startGame() {
    gameState = 'playing';
    document.getElementById('title-screen').classList.add('hidden');
    document.getElementById('game-hud').classList.remove('hidden');
    boardGroup.visible = true;
}

function showSuccess() {
    gameState = 'success';
    document.getElementById('game-hud').classList.add('hidden');
    document.getElementById('success-screen').classList.remove('hidden');
}

function restart() {
    maskCtx.clearRect(0, 0, TEX_W, TEX_H);
    updateComposite();
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-percent').textContent = '0%';
    document.getElementById('success-screen').classList.add('hidden');
    startGame();
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
