<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Effortless Lucid Dreaming – full board view</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: #060e18;
            font-family: 'Inter', system-ui, sans-serif;
            color: #e6d9c8;
            touch-action: none;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        canvas#scene {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Hint to the compositor to keep this layer on the GPU */
            will-change: transform;
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            z-index: 10;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
        }

        #title-screen {
            background: rgba(6, 14, 24, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        #success-screen {
            background: rgba(6, 14, 24, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            text-shadow: 0 0 40px rgba(230, 217, 200, 0.35);
            letter-spacing: -1.5px;
            line-height: 1.1;
        }

        h1 { font-size: clamp(2.8rem, 9vw, 5.5rem); font-weight: 700; }
        h2 { font-size: clamp(2.2rem, 7vw, 4rem); font-weight: 700; }

        .subtitle {
            font-size: 1.1rem;
            margin-top: 10px;
            opacity: 0.55;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            background: rgba(230, 217, 200, 0.08);
            color: #e6d9c8;
            border: 1.5px solid rgba(230, 217, 200, 0.5);
            padding: 14px 44px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            margin-top: 40px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(6px);
        }

        .btn:hover, .btn:active {
            background: rgba(230, 217, 200, 0.9);
            color: #0a1428;
            border-color: #e6d9c8;
            transform: scale(1.04);
        }

        .btn:active { transform: scale(0.97); }

        #game-hud {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            transition: opacity 0.6s ease;
        }

        #game-hud.hidden { opacity: 0; }

        .hud-top { display: flex; justify-content: center; }

        .hud-instruction {
            background: rgba(6, 14, 24, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 10px 24px;
            border-radius: 40px;
            border: 1px solid rgba(230, 217, 200, 0.08);
        }

        .hud-instruction p { font-size: 0.9rem; opacity: 0.85; }
        .hud-instruction p.hint { font-size: 0.75rem; opacity: 0.45; margin-top: 2px; }

        .hud-bottom { max-width: 280px; margin: 0 auto; width: 100%; }

        .progress-track {
            width: 100%;
            height: 3px;
            background: rgba(230, 217, 200, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(230, 217, 200, 0.4), #c8bda8);
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 6px;
        }

        .progress-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0.35; }
        .progress-percent { font-size: 1.2rem; font-weight: 600; opacity: 0.9; }

        blockquote {
            max-width: 380px;
            font-size: 1.15rem;
            line-height: 1.7;
            font-style: italic;
            opacity: 0.75;
            margin: 32px 0 0;
            font-weight: 300;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0);    }
        }

        .animate-in        { animation: fadeInUp 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .animate-in-delay  { opacity: 0; animation: fadeInUp 0.9s cubic-bezier(0.23, 1, 0.32, 1) 0.2s forwards; }
        .animate-in-delay2 { opacity: 0; animation: fadeInUp 0.9s cubic-bezier(0.23, 1, 0.32, 1) 0.4s forwards; }
    </style>
</head>
<body>

<canvas id="scene"></canvas>

<!-- Title Screen -->
<div id="title-screen" class="screen">
    <h1 class="animate-in">Effortless<br>Lucid Dreaming</h1>
    <p class="subtitle animate-in-delay">Stage 1 · Clear Your Mind</p>
    <button class="btn animate-in-delay2" onclick="startGame()">Begin Gently</button>
</div>

<!-- Game HUD -->
<div id="game-hud" class="hidden">
    <div class="hud-top">
        <div class="hud-instruction">
            <p>Gently swipe to erase the day.</p>
            <p class="hint">Relax. Let go.</p>
        </div>
    </div>
    <div class="hud-bottom">
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-meta">
            <span class="progress-label">Clarity</span>
            <span class="progress-percent" id="progress-percent">0%</span>
        </div>
    </div>
</div>

<!-- Success Screen -->
<div id="success-screen" class="screen hidden">
    <h2 class="animate-in">Mind Cleared</h2>
    <blockquote class="animate-in-delay">
        "Don't strain—just relax and let go.<br><br>
        Ease is the fuel.<br>
        Effort kills the vibe."
    </blockquote>
    <button class="btn animate-in-delay2" onclick="restart()">Dream On →</button>
</div>

<script>
// ─── Renderer ────────────────────────────────────────────────
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#060e18');
scene.fog = new THREE.Fog('#060e18', 6, 22);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 0, 4.2);

// ─── Lighting ────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xe6d9c8, 0.25);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xe6d9c8, 0.45);
dirLight.position.set(2, 3, 5);
scene.add(dirLight);

const fillLight = new THREE.PointLight(0x6b8cb8, 0.25, 12);
fillLight.position.set(-3, 1, 3);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0xe6d9c8, 0.15, 10);
rimLight.position.set(0, -2, 4);
scene.add(rimLight);

// ─── Stars ───────────────────────────────────────────────────
const STAR_COUNT = 400;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(STAR_COUNT * 3);
for (let i = 0; i < STAR_COUNT; i++) {
    starPos[i * 3]     = (Math.random() - 0.5) * 35;
    starPos[i * 3 + 1] = (Math.random() - 0.5) * 25;
    starPos[i * 3 + 2] = -4 - Math.random() * 18;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({
    size: 0.04, color: 0xc8bda8, transparent: true, opacity: 0.5,
    sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ─── Dust Particles ──────────────────────────────────────────
const DUST_COUNT = 150;
const dustGeo = new THREE.BufferGeometry();
const dustPos  = new Float32Array(DUST_COUNT * 3);
const dustVel  = new Float32Array(DUST_COUNT * 3);
for (let i = 0; i < DUST_COUNT; i++) {
    dustPos[i * 3]     = (Math.random() - 0.5) * 9;
    dustPos[i * 3 + 1] = (Math.random() - 0.5) * 7;
    dustPos[i * 3 + 2] = (Math.random() - 0.5) * 3 - 1;
    dustVel[i * 3]     = (Math.random() - 0.5) * 0.004;
    dustVel[i * 3 + 1] = Math.random() * 0.006 + 0.002;
    dustVel[i * 3 + 2] = (Math.random() - 0.5) * 0.002;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({
    size: 0.035, color: 0xe6d9c8, transparent: true, opacity: 0.15,
    sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending
});
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

// ─── Chalkboard ──────────────────────────────────────────────
const BOARD_W = 4.8, BOARD_H = 3.2;
const FRAME_OVERHANG = 0.22;
const TOTAL_BOARD_W = BOARD_W + FRAME_OVERHANG;
const TOTAL_BOARD_H = BOARD_H + FRAME_OVERHANG;

const TEX_W = 512, TEX_H = 340;
const ERASE_RADIUS = 30;

const boardGroup = new THREE.Group();
boardGroup.visible = false;
scene.add(boardGroup);

// Base (cleared surface)
const baseMat  = new THREE.MeshStandardMaterial({ color: '#0c1820', roughness: 0.95 });
const baseMesh = new THREE.Mesh(new THREE.PlaneGeometry(BOARD_W, BOARD_H), baseMat);
baseMesh.position.z = -0.005;
boardGroup.add(baseMesh);

// Chalk texture
const chalkCanvas = document.createElement('canvas');
chalkCanvas.width = TEX_W; chalkCanvas.height = TEX_H;
const chalkCtx = chalkCanvas.getContext('2d');

function drawChalkboard() {
    chalkCtx.fillStyle = '#162428';
    chalkCtx.fillRect(0, 0, TEX_W, TEX_H);
    for (let i = 0; i < 5000; i++) {
        chalkCtx.fillStyle = `rgba(255,255,255,${Math.random() * 0.025})`;
        chalkCtx.fillRect(Math.random() * TEX_W, Math.random() * TEX_H, 1, 1);
    }
    chalkCtx.textBaseline = 'top';
    const writings = [
        { t: '9:00 — morning meeting',     x: 35,  y: 28,  s: 17 },
        { t: 'reply to emails ✓',           x: 295, y: 22,  s: 15 },
        { t: 'grocery list:',               x: 40,  y: 85,  s: 18 },
        { t: '• milk, bread, eggs',         x: 55,  y: 112, s: 15 },
        { t: '• coffee beans',              x: 55,  y: 135, s: 15 },
        { t: 'call mom back',               x: 300, y: 90,  s: 16 },
        { t: 'workout — 30 min run',        x: 42,  y: 185, s: 16 },
        { t: 'finish report !!!',           x: 290, y: 175, s: 17 },
        { t: 'dentist @ 3pm',              x: 80,  y: 240, s: 16 },
        { t: 'pick up laundry',            x: 310, y: 240, s: 15 },
        { t: 'anxiety about tomorrow...', x: 120, y: 295, s: 16 },
    ];
    writings.forEach(({ t, x, y, s }) => {
        chalkCtx.font = `${s}px Inter, sans-serif`;
        for (let p = 0; p < 3; p++) {
            const ox = (Math.random() - 0.5) * 0.8;
            const oy = (Math.random() - 0.5) * 0.8;
            chalkCtx.fillStyle = `rgba(215, 205, 188, ${0.18 + Math.random() * 0.35})`;
            chalkCtx.fillText(t, x + ox, y + oy);
        }
    });
}
drawChalkboard();

const chalkTexture = new THREE.CanvasTexture(chalkCanvas);

// Erase mask
const maskCanvas = document.createElement('canvas');
maskCanvas.width = TEX_W; maskCanvas.height = TEX_H;
const maskCtx = maskCanvas.getContext('2d', { willReadFrequently: true });

// Composite canvas
const compCanvas = document.createElement('canvas');
compCanvas.width = TEX_W; compCanvas.height = TEX_H;
const compCtx = compCanvas.getContext('2d');
const compTexture = new THREE.CanvasTexture(compCanvas);

function compositeBoard() {
    compCtx.clearRect(0, 0, TEX_W, TEX_H);
    compCtx.drawImage(chalkCanvas, 0, 0);
    compCtx.globalCompositeOperation = 'destination-out';
    compCtx.drawImage(maskCanvas, 0, 0);
    compCtx.globalCompositeOperation = 'source-over';
    compTexture.needsUpdate = true;
}
compositeBoard();

const chalkMat  = new THREE.MeshStandardMaterial({
    map: compTexture, transparent: true, side: THREE.DoubleSide, roughness: 0.85
});
const chalkMesh = new THREE.Mesh(new THREE.PlaneGeometry(BOARD_W, BOARD_H), chalkMat);
boardGroup.add(chalkMesh);

// Wooden frame
const frameMat  = new THREE.MeshStandardMaterial({ color: '#221a10', roughness: 0.92, metalness: 0.05 });
const frameData = [
    { p: [0, BOARD_H/2 + 0.055, 0.01],    s: [BOARD_W + 0.22, 0.11, 0.07] },
    { p: [0, -BOARD_H/2 - 0.055, 0.01],   s: [BOARD_W + 0.22, 0.11, 0.07] },
    { p: [-BOARD_W/2 - 0.055, 0, 0.01],   s: [0.11, BOARD_H + 0.22, 0.07] },
    { p: [BOARD_W/2 + 0.055, 0, 0.01],    s: [0.11, BOARD_H + 0.22, 0.07] },
];
frameData.forEach(({ p, s }) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(...s), frameMat);
    m.position.set(...p);
    boardGroup.add(m);
});

const tray = new THREE.Mesh(new THREE.BoxGeometry(BOARD_W * 0.5, 0.05, 0.1), frameMat);
tray.position.set(0, -BOARD_H/2 - 0.16, 0.07);
boardGroup.add(tray);

const chalkPieceMat = new THREE.MeshStandardMaterial({ color: '#d4cbb8', roughness: 0.95 });
[-0.4, 0.1, 0.5].forEach(ox => {
    const piece = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.12 + Math.random() * 0.06, 6), chalkPieceMat);
    piece.rotation.z = Math.PI / 2 + (Math.random() - 0.5) * 0.3;
    piece.position.set(ox, -BOARD_H/2 - 0.13, 0.1);
    boardGroup.add(piece);
});

// ─── Camera fit ──────────────────────────────────────────────
function adjustCameraForAspect() {
    const aspect    = window.innerWidth / window.innerHeight;
    const fovRad    = camera.fov * Math.PI / 180;
    const tanHalfFov = Math.tan(fovRad / 2);
    const padding   = 1.1;
    const targetH   = Math.max(TOTAL_BOARD_H * padding, (TOTAL_BOARD_W * padding) / aspect);
    camera.position.z = targetH / (2 * tanHalfFov);
}
adjustCameraForAspect();

// ─── Erase / Progress ────────────────────────────────────────
let gameState  = 'title';
let progress   = 0;

// *** KEY CHANGE: track erased pixels incrementally ***
// We count pixels as we paint the mask rather than re-scanning every frame.
const TOTAL_PIXELS = TEX_W * TEX_H;
let erasedEstimate = 0;      // rough running tally (0..1)

function eraseAt(uv) {
    const cx = uv.x * TEX_W;
    const cy = (1 - uv.y) * TEX_H;
    const grad = maskCtx.createRadialGradient(cx, cy, 0, cx, cy, ERASE_RADIUS);
    grad.addColorStop(0, 'rgba(255,255,255,0.55)');
    grad.addColorStop(0.5, 'rgba(255,255,255,0.25)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    maskCtx.fillStyle = grad;
    maskCtx.beginPath();
    maskCtx.arc(cx, cy, ERASE_RADIUS, 0, Math.PI * 2);
    maskCtx.fill();
}

// Cheap pixel-count: only called every N frames from the render loop,
// never from the touch handler.
const PROGRESS_SAMPLE_STRIDE = 16; // sample every 16th pixel (x4 less work than original stride=20 but row-aligned)
function calcProgressFromMask() {
    const data = maskCtx.getImageData(0, 0, TEX_W, TEX_H).data;
    let erased = 0, total = 0;
    for (let i = 3; i < data.length; i += PROGRESS_SAMPLE_STRIDE * 4) {
        total++;
        if (data[i] > 100) erased++;
    }
    return erased / total;
}

// ─── Input: decouple from canvas work ────────────────────────
// Pending UV coords collected during the current frame.
// The render loop drains this queue once per rAF tick.
const pendingUVs   = [];
let   isDragging   = false;
const raycaster    = new THREE.Raycaster();
const pointer      = new THREE.Vector2();

// Collect a hit without touching the canvas at all.
function queueInteraction(clientX, clientY) {
    if (gameState !== 'playing') return;
    const rect = canvas.getBoundingClientRect();
    pointer.x  =  ((clientX - rect.left) / rect.width)  * 2 - 1;
    pointer.y  = -((clientY - rect.top)  / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObject(chalkMesh);
    if (hits.length > 0 && hits[0].uv) {
        // Clone the UV so it isn't mutated before the render loop reads it
        pendingUVs.push(hits[0].uv.clone());
    }
}

// *** Only pointer events needed — they fire on mouse AND touch on all modern browsers ***
canvas.addEventListener('pointerdown', e => {
    isDragging = true;
    queueInteraction(e.clientX, e.clientY);
}, { passive: true });

canvas.addEventListener('pointermove', e => {
    if (!isDragging) return;
    // coalesced events give us the full sub-frame path on supported browsers (Chrome/Edge)
    const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    for (const ce of events) queueInteraction(ce.clientX, ce.clientY);
}, { passive: true });

canvas.addEventListener('pointerup',    () => isDragging = false, { passive: true });
canvas.addEventListener('pointerleave', () => isDragging = false, { passive: true });
canvas.addEventListener('pointercancel',() => isDragging = false, { passive: true });

// ─── UI ──────────────────────────────────────────────────────
const titleScreen    = document.getElementById('title-screen');
const successScreen  = document.getElementById('success-screen');
const gameHud        = document.getElementById('game-hud');
const progressFill   = document.getElementById('progress-fill');
const progressPercent = document.getElementById('progress-percent');

function updateHUD() {
    const pct = Math.round(progress * 100);
    progressFill.style.width   = pct + '%';
    progressPercent.textContent = pct + '%';
}

function startGame() {
    gameState = 'playing';
    titleScreen.classList.add('hidden');
    gameHud.classList.remove('hidden');
    boardGroup.visible = true;
}

function showSuccess() {
    gameState = 'success';
    gameHud.classList.add('hidden');
    successScreen.classList.remove('hidden');
}

function restart() {
    maskCtx.clearRect(0, 0, TEX_W, TEX_H);
    drawChalkboard();
    chalkTexture.needsUpdate = true;
    compositeBoard();
    progress = 0;
    erasedEstimate = 0;
    updateHUD();
    successScreen.classList.add('hidden');
    boardGroup.visible = false;
    gameState = 'title';
    titleScreen.classList.remove('hidden');
}

// ─── Render loop ─────────────────────────────────────────────
const clock = new THREE.Clock();
let   progressCheckCountdown = 0; // tick-down; check progress every N frames

function animate() {
    requestAnimationFrame(animate);
    const t  = clock.getElapsedTime();
    const dt = clock.getDelta();

    // ── Drain pending UVs (all canvas work happens here, once per frame) ──
    if (pendingUVs.length > 0) {
        for (const uv of pendingUVs) eraseAt(uv);
        pendingUVs.length = 0; // clear without re-alloc

        compositeBoard();       // one composite per frame, not per touch point

        // Recalculate progress only every 4 frames to avoid repeated getImageData
        progressCheckCountdown--;
        if (progressCheckCountdown <= 0) {
            progressCheckCountdown = 4;
            progress = Math.min(calcProgressFromMask(), 1);
            updateHUD();
            if (progress >= 0.7) showSuccess();
        }
    }

    // ── Particles ──
    stars.rotation.z = t * 0.004;
    stars.rotation.y = Math.sin(t * 0.08) * 0.015;

    const dArr      = dust.geometry.getAttribute('position').array;
    const intensity = 0.3 + progress * 2.5;
    for (let i = 0; i < DUST_COUNT; i++) {
        dArr[i * 3]     += dustVel[i * 3]     * intensity;
        dArr[i * 3 + 1] += dustVel[i * 3 + 1] * intensity;
        dArr[i * 3 + 2] += dustVel[i * 3 + 2] * intensity;
        if (dArr[i * 3 + 1] > 4.5) {
            dArr[i * 3]     = (Math.random() - 0.5) * 9;
            dArr[i * 3 + 1] = -3.5;
            dArr[i * 3 + 2] = (Math.random() - 0.5) * 3 - 1;
        }
    }
    dust.geometry.getAttribute('position').needsUpdate = true;
    dustMat.opacity = 0.1 + progress * 0.35;

    // ── Board gentle float ──
    if (boardGroup.visible) {
        boardGroup.rotation.x = Math.sin(t * 0.35) * 0.012;
        boardGroup.rotation.y = Math.sin(t * 0.25) * 0.008;
        boardGroup.position.y = Math.sin(t * 0.4)  * 0.02;
    }

    ambientLight.intensity = 0.25 + Math.sin(t * 0.5) * 0.05 + progress * 0.15;

    renderer.render(scene, camera);
}

animate();

// ─── Resize ──────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    adjustCameraForAspect();
});
</script>
</body>
</html>
